<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - MovieHub</title>

    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <a href="../MovieDashboard/movie.html" class="back-btn">
    <i class="fas fa-arrow-left"></i> Back
</a>


    <div class="profile-container">

        <div class="profile-header">

            <img
                id="profile-avatar"
                src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                alt="Avatar">

            <h1 id="profile-name">MovieHub User</h1>

            <button id="edit-profile">
                ✏️ Edit Profile
            </button>
            <div class="avatar-grid">

    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Robot" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=Panda" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=Lion" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=Fox" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=Cat" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=Penguin" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Alien" class="avatar-option">

    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Dragon" class="avatar-option">

</div>
<p class="profile-subtitle">
    Your personal MovieHub collection 🎬
</p>

        </div>



        <h2>My Watchlist</h2>

        <div id="watchlist-movies"></div>

        <h2>▶ Recently Watched Trailers</h2>

            <div id="recent-trailers"></div>

    </div>
    <script src="profile.js"></script>

</body>
</html>
